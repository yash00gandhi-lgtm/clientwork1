<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <title>Fitness Place — CRM</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <!-- Lenis smooth scroll -->
    <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>

    <!-- App API (PRESERVED - DO NOT MOVE) -->
    <script src="/static/frontend/js/api.js"></script>

    <style>
        :root {
            --bg:           #0a0a0a;
            --bg-elev:      #111111;
            --surface:      rgba(20, 20, 20, 0.55);
            --border:       rgba(255, 255, 255, 0.06);
            --border-strong:rgba(255, 255, 255, 0.10);
            --text:         #fafafa;
            --text-soft:    #a1a1aa;
            --text-muted:   #71717a;
            --text-dim:     #52525b;
            --red:          #dc2626;
            --red-bright:   #ef4444;
            --red-deep:     #991b1b;
            --red-glow:     rgba(220, 38, 38, 0.35);
        }

        * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

        html { background: var(--bg); }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Manrope', system-ui, sans-serif;
            font-feature-settings: "ss01", "cv11";
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -10%, rgba(220, 38, 38, 0.10), transparent 60%),
                radial-gradient(ellipse 60% 40% at 100% 100%, rgba(220, 38, 38, 0.06), transparent 60%);
            background-attachment: fixed;
        }

        .display-font { font-family: 'Bricolage Grotesque', sans-serif; letter-spacing: -0.025em; }
        .mono-font    { font-family: 'JetBrains Mono', monospace; }

        /* Subtle grain overlay for premium feel */
        body::before {
            content: "";
            position: fixed; inset: 0;
            pointer-events: none;
            z-index: 1;
            opacity: 0.025;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1f1f1f; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #2a2a2a; }

        /* Glass card */
        .glass {
            background:
                linear-gradient(180deg, rgba(255,255,255,0.025), rgba(255,255,255,0)),
                rgba(15, 15, 15, 0.55);
            border: 1px solid var(--border);
            backdrop-filter: blur(24px) saturate(140%);
            -webkit-backdrop-filter: blur(24px) saturate(140%);
        }
        .glass-hover { transition: all .35s cubic-bezier(.4,0,.2,1); }
        .glass-hover:hover {
            border-color: rgba(220, 38, 38, 0.28);
            box-shadow: 0 12px 40px -12px var(--red-glow), 0 0 0 1px rgba(220,38,38,0.08);
            transform: translateY(-2px);
        }

        /* Red gradient button */
        .btn-red {
            position: relative;
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 12px 22px;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: -0.01em;
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            box-shadow:
                0 6px 24px -6px rgba(220, 38, 38, 0.45),
                inset 0 1px 0 rgba(255,255,255,0.15),
                inset 0 -1px 0 rgba(0,0,0,0.2);
            transition: all .25s cubic-bezier(.4,0,.2,1);
            overflow: hidden;
            cursor: pointer;
            border: 0;
        }
        .btn-red::after {
            content: "";
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.18), rgba(255,255,255,0));
            opacity: 0;
            transition: opacity .25s;
        }
        .btn-red:hover {
            transform: translateY(-1px);
            box-shadow:
                0 10px 32px -6px rgba(220, 38, 38, 0.6),
                inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .btn-red:hover::after { opacity: 1; }
        .btn-red:active { transform: translateY(0); }

        /* Small pill button (for table row actions) */
        .btn-pill {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: -0.005em;
            color: #fecaca;
            background: linear-gradient(135deg, rgba(220,38,38,0.18), rgba(153,27,27,0.10));
            border: 1px solid rgba(220, 38, 38, 0.30);
            cursor: pointer;
            transition: all .2s ease;
            font-family: inherit;
        }
        .btn-pill:hover {
            color: #fff;
            background: linear-gradient(135deg, #dc2626, #991b1b);
            border-color: rgba(220, 38, 38, 0.6);
            box-shadow: 0 4px 16px -4px var(--red-glow);
            transform: translateY(-1px);
        }

        /* Sidebar nav */
        .nav-link {
            position: relative;
            display: flex; align-items: center; gap: 12px;
            padding: 11px 14px;
            border-radius: 11px;
            color: var(--text-soft);
            font-weight: 500;
            font-size: 14px;
            letter-spacing: -0.01em;
            transition: color .2s ease, background .2s ease;
            text-decoration: none;
        }
        .nav-link:hover {
            color: var(--text);
            background: rgba(255,255,255,0.025);
        }
        .nav-link.active {
            color: #fff;
            background: linear-gradient(90deg, rgba(220, 38, 38, 0.18), rgba(220, 38, 38, 0.02) 80%);
            box-shadow: inset 0 0 0 1px rgba(220, 38, 38, 0.22);
        }
        .nav-link.active::before {
            content: "";
            position: absolute; left: 0; top: 9px; bottom: 9px;
            width: 2px;
            background: linear-gradient(180deg, #ef4444, #991b1b);
            border-radius: 2px;
            box-shadow: 0 0 10px var(--red-glow), 0 0 20px rgba(220,38,38,0.4);
        }
        .nav-link svg { flex-shrink: 0; opacity: .75; transition: opacity .2s, color .2s; }
        .nav-link:hover svg { opacity: 1; }
        .nav-link.active svg { opacity: 1; color: #ef4444; }

        /* Modern table */
        .crm-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 6px;
        }
        .crm-table thead th {
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.10em;
            color: var(--text-muted);
            padding: 10px 18px 14px;
            border-bottom: 1px solid var(--border);
        }
        .crm-table tbody tr {
            background: rgba(255, 255, 255, 0.012);
            transition: all .2s ease;
        }
        .crm-table tbody tr:hover {
            background: rgba(220, 38, 38, 0.04);
            box-shadow: inset 0 0 0 1px rgba(220, 38, 38, 0.18);
        }
        .crm-table tbody td {
            padding: 16px 18px;
            font-size: 14px;
            color: var(--text-soft);
            border: 0;
            vertical-align: middle;
        }
        .crm-table tbody td:first-child {
            border-radius: 12px 0 0 12px;
            color: var(--text);
            font-weight: 500;
        }
        .crm-table tbody td:last-child {
            border-radius: 0 12px 12px 0;
            text-align: right;
        }
        .crm-table tbody tr.empty-state td {
            padding: 56px 18px;
            text-align: center;
            color: var(--text-dim);
            font-weight: 500;
        }

        /* Status pills */
        .pill {
            display: inline-flex; align-items: center; gap: 7px;
            padding: 4px 11px;
            border-radius: 999px;
            font-size: 11.5px;
            font-weight: 600;
            letter-spacing: 0.01em;
            border: 1px solid var(--border-strong);
            background: rgba(255,255,255,0.02);
            color: var(--text-soft);
            text-transform: capitalize;
        }
        .pill::before {
            content: "";
            width: 6px; height: 6px;
            border-radius: 50%;
            background: currentColor;
            box-shadow: 0 0 8px currentColor;
        }
        .pill-new       { color: #fbbf24; border-color: rgba(251, 191, 36, 0.25); background: rgba(251, 191, 36, 0.05); }
        .pill-contacted { color: #60a5fa; border-color: rgba(96, 165, 250, 0.25); background: rgba(96, 165, 250, 0.05); }
        .pill-converted { color: #34d399; border-color: rgba(52, 211, 153, 0.25); background: rgba(52, 211, 153, 0.05); }
        .pill-lost      { color: #ef4444; border-color: rgba(239, 68, 68, 0.25); background: rgba(239, 68, 68, 0.05); }
        .pill-pending   { color: #a78bfa; border-color: rgba(167, 139, 250, 0.25); background: rgba(167, 139, 250, 0.05); }

        /* Section eyebrow */
        .eyebrow {
            display: inline-flex; align-items: center; gap: 8px;
            font-size: 11px; font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            color: #ef4444;
        }
        .eyebrow::before {
            content: "";
            width: 16px; height: 1px;
            background: linear-gradient(90deg, #ef4444, transparent);
        }

        /* Focus states */
        :focus-visible { outline: 2px solid var(--red); outline-offset: 2px; border-radius: 6px; }

        /* Mobile sidebar slide */
        @media (max-width: 1023px) {
            #sidebar {
                transform: translateX(-100%);
                transition: transform .35s cubic-bezier(.4,0,.2,1);
            }
            #sidebar.open { transform: translateX(0); }
        }

        /* Reveal init state (prevents flash before GSAP) */
        [data-animate] { opacity: 0; }

        main { position: relative; z-index: 2; }
    </style>
</head>
<body>

<!-- Mobile top bar -->
<header class="lg:hidden fixed top-0 left-0 right-0 h-14 bg-black/85 backdrop-blur-xl border-b border-white/5 z-40 flex items-center justify-between px-5">
    <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background: linear-gradient(135deg, #ef4444, #991b1b); box-shadow: 0 4px 16px var(--red-glow);">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M6.5 6.5h11M6.5 17.5h11M3 12h18M9 3v18M15 3v18"/></svg>
        </div>
        <span class="display-font font-bold text-base tracking-tight">Fitness Place</span>
    </div>
    <button id="menuToggle" aria-label="Toggle menu" class="w-10 h-10 rounded-lg border border-white/10 flex items-center justify-center hover:bg-white/5 transition">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
</header>

<!-- Sidebar overlay (mobile) -->
<div id="sidebarOverlay" class="lg:hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-40 hidden"></div>

<!-- SIDEBAR -->
<aside id="sidebar" class="fixed top-0 left-0 h-full w-[260px] z-50 lg:z-30 flex flex-col" style="background: linear-gradient(180deg, #0c0c0c 0%, #080808 100%); border-right: 1px solid rgba(255,255,255,0.05);">
    <!-- Brand -->
    <div class="px-6 py-7 border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-11 h-11 rounded-xl flex items-center justify-center relative" style="background: linear-gradient(135deg, #ef4444 0%, #991b1b 100%); box-shadow: 0 8px 28px var(--red-glow);">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M6.5 6.5h11M6.5 17.5h11M3 12h18M9 3v18M15 3v18"/></svg>
            </div>
            <div>
                <div class="display-font font-bold text-[17px] leading-none tracking-tight">Fitness Place</div>
                <div class="text-[10.5px] text-zinc-500 mt-1.5 font-semibold tracking-[0.18em] uppercase">Gym CRM</div>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 px-3 py-5 overflow-y-auto">
        <div class="px-3 mb-3 text-[10px] font-semibold tracking-[0.18em] uppercase text-zinc-600">Workspace</div>
        <div class="space-y-1">
            <a href="{% url 'dashboard' %}" class="nav-link" data-nav="dashboard">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
                <span>Dashboard</span>
            </a>
            <a href="{% url 'leads' %}" class="nav-link" data-nav="leads">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <span>Leads</span>
            </a>
            <a href="{% url 'bookings' %}" class="nav-link" data-nav="bookings">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <span>Bookings</span>
            </a>
            <a href="{% url 'automation' %}" class="nav-link" data-nav="automation">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                <span>Automation</span>
            </a>
        </div>
    </nav>

    <!-- Footer -->
    <div class="px-4 py-4 border-t border-white/5">
        <div class="glass rounded-xl p-3 flex items-center gap-3">
            <div class="w-9 h-9 rounded-full flex items-center justify-center font-bold text-[13px] text-white" style="background: linear-gradient(135deg, #ef4444, #991b1b);">FP</div>
            <div class="flex-1 min-w-0">
                <div class="text-[13px] font-semibold truncate text-white">Admin</div>
                <div class="text-[11px] text-zinc-500 truncate font-medium">Pro Plan · Active</div>
            </div>
            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981]"></span>
        </div>
    </div>
</aside>

<!-- MAIN CONTENT -->
<main class="lg:pl-[260px] pt-14 lg:pt-0 min-h-screen">
    <div class="max-w-[1400px] mx-auto px-5 sm:px-8 lg:px-10 py-8 lg:py-10">
        {% block content %}{% endblock %}
    </div>
</main>

<script>
    // Active nav highlight based on URL
    (function () {
        const path = window.location.pathname.replace(/\/$/, '');
        const links = document.querySelectorAll('[data-nav]');
        let matched = false;
        links.forEach(link => {
            const linkPath = (link.getAttribute('href') || '').replace(/\/$/, '');
            if (linkPath && (path === linkPath || (linkPath !== '' && path.startsWith(linkPath + '/')))) {
                link.classList.add('active'); matched = true;
            }
        });
        if (!matched) {
            links.forEach(link => {
                const key = link.dataset.nav;
                if (key && path.toLowerCase().includes(key)) link.classList.add('active');
            });
        }
    })();

    // Mobile sidebar toggle
    (function () {
        const toggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        if (!toggle || !sidebar || !overlay) return;
        const open = () => { sidebar.classList.add('open'); overlay.classList.remove('hidden'); };
        const close = () => { sidebar.classList.remove('open'); overlay.classList.add('hidden'); };
        toggle.addEventListener('click', () => sidebar.classList.contains('open') ? close() : open());
        overlay.addEventListener('click', close);
        sidebar.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
            if (window.innerWidth < 1024) close();
        }));
    })();

    // Lenis smooth scroll
    (function () {
        if (typeof Lenis === 'undefined') return;
        const lenis = new Lenis({
            duration: 1.05,
            easing: t => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            smoothWheel: true
        });
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);
        window.lenis = lenis;
    })();

    // Page-load entrance: fade + slide on elements marked [data-animate="fade-up"]
    window.addEventListener('DOMContentLoaded', () => {
        if (typeof gsap === 'undefined') {
            // Fallback: just show
            document.querySelectorAll('[data-animate]').forEach(el => el.style.opacity = 1);
            return;
        }
        gsap.to('[data-animate="fade-up"]', {
            opacity: 1, y: 0,
            duration: 0.7,
            ease: 'power3.out',
            stagger: 0.07,
            delay: 0.05
        });
        gsap.set('[data-animate="fade-up"]', { y: 20 });
        gsap.to('[data-animate="fade-up"]', { y: 0, duration: 0.7, ease: 'power3.out', stagger: 0.07 });
    });

    // Helper: stagger-reveal table rows after they're injected by API calls
    window.animateRows = function (selector) {
        if (typeof gsap === 'undefined') return;
        const rows = document.querySelectorAll(selector);
        gsap.fromTo(rows,
            { opacity: 0, y: 10 },
            { opacity: 1, y: 0, duration: 0.5, ease: 'power2.out', stagger: 0.04 }
        );
    };
</script>

</body>
</html>
