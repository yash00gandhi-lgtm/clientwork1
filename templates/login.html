<!DOCTYPE html>
<html>
<head>
    <title>Client Login</title>

    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .login-box {
            background: #111;
            padding: 40px;
            border-radius: 12px;
            width: 300px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255,0,0,0.2);
        }

        h2 {
            margin-bottom: 25px;
            color: #ff2c2c;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 6px;
            background: #1a1a1a;
            color: white;
        }

        input:focus {
            outline: none;
            box-shadow: 0 0 5px red;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 6px;
            background: #ff2c2c;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #ff4d4d;
        }

        #error {
            margin-top: 15px;
            color: #ff4d4d;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>Client Login</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p id="error"></p>
</div>

<script>
async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
        const res = await fetch("/api/auth/auth/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: email,
                password: password
            })
        });

        const data = await res.json();

        if (res.ok && data.user_id) {
            window.location.href = "/dashboard/";
        } else {
            document.getElementById("error").innerText = data.error || "Invalid login";
        }

    } catch (err) {
        document.getElementById("error").innerText = "Server error";
    }
}
</script>

</body>
</html>
