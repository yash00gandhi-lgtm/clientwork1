{% extends "base.html" %}

{% block content %}

<!-- HEADER -->
<div class="flex flex-col md:flex-row md:items-end md:justify-between gap-5 mb-9" data-animate="fade-up">
    <div>
        <div class="flex items-center gap-3 mb-4">
            <span class="eyebrow">Pipeline</span>
        </div>
        <h1 class="display-font text-4xl md:text-5xl font-bold tracking-tight text-white">Leads</h1>
        <p class="text-zinc-500 mt-2.5 text-[15px] max-w-xl">Track every prospect, follow-up and conversion in one premium view.</p>
    </div>
    <div class="flex items-center gap-3" data-animate="fade-up">
        <div class="hidden sm:flex items-center gap-2 px-3.5 py-2.5 rounded-xl border border-white/5 bg-white/[0.02]">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#71717a" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input id="leadSearch" type="text" placeholder="Search leads…" class="bg-transparent outline-none text-sm text-white placeholder-zinc-600 w-44" />
        </div>
    </div>
</div>

<!-- TABLE CARD -->
<div class="glass rounded-2xl overflow-hidden" data-animate="fade-up">

    <div class="flex items-center justify-between px-6 py-5 border-b border-white/5">
        <div class="flex items-center gap-3">
            <h2 class="display-font text-lg font-semibold text-white">All Leads</h2>
            <span class="pill text-zinc-400 text-[10.5px]">Realtime</span>
        </div>
        <div class="flex items-center gap-2 text-[11.5px] text-zinc-500 font-medium">
            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981]"></span>
            Connected
        </div>
    </div>

    <div class="overflow-x-auto px-3 sm:px-4 py-3">
        <table class="crm-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Status</th>
                    <th class="text-right pr-6">Action</th>
                </tr>
            </thead>
            <tbody id="leadsTable">
                <tr class="empty-state">
                    <td colspan="4">
                        <div class="flex flex-col items-center gap-3 opacity-70">
                            <div class="w-10 h-10 rounded-xl border border-white/5 flex items-center justify-center">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#52525b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                            </div>
                            <span class="text-[13px]">Loading leads…</span>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<script>
/* ====== ORIGINAL API LOGIC — DO NOT REMOVE ====== */
API.getLeads().then(data => {
    let html = "";

    data.results.forEach(l => {
        const statusKey = (l.status || '').toString().toLowerCase().replace(/\s+/g, '-');
        const initials = (l.name || '?').toString().trim().split(/\s+/).map(s => s[0]).slice(0,2).join('').toUpperCase() || '?';
        html += `
        <tr data-row>
            <td>
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 rounded-full flex items-center justify-center font-semibold text-[12.5px] text-white shrink-0" style="background: linear-gradient(135deg, #1f1f1f, #0c0c0c); border: 1px solid rgba(220,38,38,0.25);">${initials}</div>
                    <div class="min-w-0">
                        <div class="font-semibold text-white text-[14px] truncate">${l.name}</div>
                        <div class="text-[11.5px] text-zinc-500 font-medium tracking-wide">Lead #${l.id}</div>
                    </div>
                </div>
            </td>
            <td><span class="mono-font text-[13px] text-zinc-300">${l.phone}</span></td>
            <td><span class="pill pill-${statusKey}">${l.status}</span></td>
            <td>
                <button onclick="convertLead(${l.id})" class="btn-pill">
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
                    Convert
                </button>
            </td>
        </tr>`;
    });

    document.getElementById("leadsTable").innerHTML = html || `
        <tr class="empty-state">
            <td colspan="4">
                <div class="flex flex-col items-center gap-3">
                    <div class="w-12 h-12 rounded-xl border border-white/5 flex items-center justify-center">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#52525b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    </div>
                    <div>
                        <div class="text-white font-semibold text-[14px]">No leads yet</div>
                        <div class="text-[12.5px] text-zinc-500 mt-1">New leads will appear here automatically.</div>
                    </div>
                </div>
            </td>
        </tr>`;

    /* visual stagger reveal — does not affect data */
    if (typeof animateRows === 'function') animateRows('#leadsTable tr[data-row]');
});

function convertLead(id) {
    fetch(`/api/leads/${id}/convert/`, {
        method: 'POST'
    })
    .then(() => location.reload())
}

/* ====== Optional client-side filter (visual only — does not touch API) ====== */
(function () {
    const search = document.getElementById('leadSearch');
    if (!search) return;
    search.addEventListener('input', () => {
        const q = search.value.toLowerCase().trim();
        document.querySelectorAll('#leadsTable tr[data-row]').forEach(row => {
            row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
        });
    });
})();
</script>

{% endblock %}
