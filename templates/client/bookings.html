{% extends "base.html" %}

{% block content %}

<!-- HEADER -->
<div class="flex flex-col md:flex-row md:items-end md:justify-between gap-5 mb-9" data-animate="fade-up">
    <div>
        <div class="flex items-center gap-3 mb-4">
            <span class="eyebrow">Schedule</span>
        </div>
        <h1 class="display-font text-4xl md:text-5xl font-bold tracking-tight text-white">Bookings</h1>
        <p class="text-zinc-500 mt-2.5 text-[15px] max-w-xl">Confirmed sessions and program signups synced in real time.</p>
    </div>
    <div class="flex items-center gap-3" data-animate="fade-up">
        <div class="hidden sm:flex items-center gap-2 px-3.5 py-2.5 rounded-xl border border-white/5 bg-white/[0.02]">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#71717a" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input id="bookingSearch" type="text" placeholder="Search bookings…" class="bg-transparent outline-none text-sm text-white placeholder-zinc-600 w-44" />
        </div>
    </div>
</div>

<!-- TABLE CARD -->
<div class="glass rounded-2xl overflow-hidden" data-animate="fade-up">

    <div class="flex items-center justify-between px-6 py-5 border-b border-white/5">
        <div class="flex items-center gap-3">
            <h2 class="display-font text-lg font-semibold text-white">All Bookings</h2>
            <span class="pill text-zinc-400 text-[10.5px]">Realtime</span>
        </div>
        <div class="flex items-center gap-2 text-[11.5px] text-zinc-500 font-medium">
            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981]"></span>
            Connected
        </div>
    </div>

    <div class="overflow-x-auto px-3 sm:px-4 py-3">
        <table class="crm-table">
    <thead>
        <tr>
            <th>Member</th>
            <th>Program</th>
            <th class="text-right pr-6">Date</th>
        </tr>
    </thead>
    <tbody id="bookingsTable">
        <tr class="empty-state">
            <td colspan="3">Loading bookings…</td>
        </tr>
    </tbody>
</table>
    </div>

</div>

<script>
/* ====== ORIGINAL API LOGIC — DO NOT REMOVE ====== */
API.getBookings().then(data => {
    let html = "";

    const list = data.results || data;

list.forEach(b => {
        const name = b.name || 'N/A';
        const initials = (name === 'N/A' ? '?' : name.toString().trim().split(/\s+/).map(s => s[0]).slice(0,2).join('').toUpperCase());
        html += `
        <tr data-row>
            <td>
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 rounded-full flex items-center justify-center font-semibold text-[12.5px] text-white shrink-0" style="background: linear-gradient(135deg, #1f1f1f, #0c0c0c); border: 1px solid rgba(220,38,38,0.25);">${initials}</div>
                    <div class="min-w-0">
                        <div class="font-semibold text-white text-[14px] truncate">${b.name || 'N/A'}</div>
                        <div class="text-[11.5px] text-zinc-500 font-medium tracking-wide">Member</div>
                    </div>
                </div>
            </td>
            <td>
                <div class="inline-flex items-center gap-2 px-2.5 py-1 rounded-lg border border-white/5 bg-white/[0.02]">
                    <span class="w-1.5 h-1.5 rounded-full" style="background:#ef4444; box-shadow:0 0 8px #ef4444"></span>
                    <span class="text-[13px] text-zinc-200 font-medium">${b.program}</span>
                </div>
            </td>
            <td><span class="mono-font text-[13px] text-zinc-300">${b.date}</span></td>
        </tr>`;
    });

    const table = document.getElementById("bookingsTable");

if (html) {
    table.innerHTML = html;
} else {
    table.innerHTML = `
        <tr class="empty-state">
            <td colspan="3">No bookings yet</td>
        </tr>
    `;
}`
                    <div class="w-12 h-12 rounded-xl border border-white/5 flex items-center justify-center">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#52525b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    </div>
                    <div>
                        <div class="text-white font-semibold text-[14px]">No bookings yet</div>
                        <div class="text-[12.5px] text-zinc-500 mt-1">New bookings will land here as members sign up.</div>
                    </div>
                </div>
            </td>
        </tr>`;

    if (typeof animateRows === 'function') animateRows('#bookingsTable tr[data-row]');
});

/* ====== Optional client-side filter (visual only) ====== */
(function () {
    const search = document.getElementById('bookingSearch');
    if (!search) return;
    search.addEventListener('input', () => {
        const q = search.value.toLowerCase().trim();
        document.querySelectorAll('#bookingsTable tr[data-row]').forEach(row => {
            row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
        });
    });
})();
</script>

{% endblock %}
